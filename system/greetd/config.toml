[terminal]
vt = 1

[default_session]
command = "tuigreet --time --time-format '%H:%M • %A, %d %B' --greeting 'Welcome to KakkuOS' --remember --remember-session --user-menu --asterisks --theme 'border=green;text=lightgray;prompt=green;time=green;action=blue;button=yellow;container=black;input=white' --cmd niri-session"
user = "greeter"
